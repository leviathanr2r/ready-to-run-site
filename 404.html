<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Page not found · Ready-to-Run</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<style>
  :root{--navy-deep:hsl(220 64% 8%);--electric:hsl(215 88% 52%);--electric-2:hsl(214 95% 62%)}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:grid;place-items:center;text-align:center;padding:2rem;
    background:var(--navy-deep);color:#fff;font-family:'Inter',system-ui,-apple-system,sans-serif;
    background-image:linear-gradient(hsl(186 90% 60% / 0.05) 1px,transparent 1px),
      linear-gradient(90deg,hsl(186 90% 60% / 0.04) 1px,transparent 1px),
      radial-gradient(ellipse 70% 44% at 50% -6%,hsl(215 88% 52% / 0.16),transparent 60%);
    background-size:64px 64px,64px 64px,auto;background-repeat:repeat,repeat,no-repeat;background-position:0 0,0 0,center top}
  .mark{width:64px;height:64px;margin:0 auto 1.6rem;display:block;border-radius:15px;
    background:linear-gradient(180deg,var(--electric-2),var(--electric))}
  .mark svg{width:64px;height:64px}
  .code{font-family:'Geist Mono',ui-monospace,monospace;letter-spacing:.18em;font-size:.72rem;
    text-transform:uppercase;color:hsl(220 13% 70%);border:1px solid hsl(220 30% 100% / 0.16);
    padding:.34rem .8rem;border-radius:999px;display:inline-block;margin-bottom:1.4rem}
  h1{font-family:'Sora',system-ui,sans-serif;font-weight:800;font-size:clamp(1.7rem,5vw,2.6rem);margin:.2rem 0 .6rem}
  p{color:hsl(220 12% 72%);max-width:30rem;margin:0 auto 1.8rem;line-height:1.6}
  a.btn{font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:.92rem;color:#fff;text-decoration:none;
    background:linear-gradient(180deg,var(--electric-2),var(--electric));border-radius:999px;
    padding:.7rem 1.5rem;display:inline-block;box-shadow:0 8px 22px -8px hsl(214 95% 52% / .7);transition:transform .16s}
  a.btn:hover{transform:translateY(-1px)}
</style>
</head>
<body>
  <main>
    <span class="mark">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20,19 33,32 20,45"/><polyline points="34,19 47,32 34,45"/>
        </g>
      </svg>
    </span>
    <span class="code">Error 404</span>
    <h1>This page took a different route.</h1>
    <p>The page you were looking for isn&rsquo;t here. Let&rsquo;s get you back to the campaign.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
